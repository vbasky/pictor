<svg width="1300" height="460" viewBox="0 0 1300 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="pictor — pure-Rust text-to-image and LLM inference">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1300" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fafbfd"/>
      <stop offset="1" stop-color="#f1f4f9"/>
    </linearGradient>
    <radialGradient id="warm" cx="22%" cy="50%" r="48%">
      <stop offset="0" stop-color="#ffedd5" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffedd5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool" cx="78%" cy="50%" r="52%">
      <stop offset="0" stop-color="#dbeafe" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#dbeafe" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdba74"/>
      <stop offset="0.5" stop-color="#f97316"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="canvasGlow" cx="50%" cy="40%" r="65%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#eef2f7"/>
      <stop offset="1" stop-color="#dbe4f0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#c8d2e4"/>
    </pattern>
    <filter id="logoShadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#334155" flood-opacity="0.18"/>
    </filter>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <clipPath id="card"><rect x="0" y="0" width="1300" height="460" rx="18"/></clipPath>
    <clipPath id="canvasClip"><rect x="198" y="118" width="148" height="118" rx="10"/></clipPath>
  </defs>

  <rect x="0" y="0" width="1300" height="460" rx="18" fill="url(#bg)" stroke="#d5dce8" stroke-width="2"/>

  <g clip-path="url(#card)">
    <rect width="1300" height="460" fill="url(#dots)"/>
    <rect width="1300" height="460" fill="url(#warm)"/>
    <rect width="1300" height="460" fill="url(#cool)"/>
    <g opacity="0.75">
      <rect x="1080" y="34" width="32" height="9" rx="4.5" fill="#2563eb"/>
      <rect x="1120" y="34" width="32" height="9" rx="4.5" fill="#2563eb"/>
      <rect x="1160" y="34" width="32" height="9" rx="4.5" fill="#f97316"/>
      <rect x="1200" y="34" width="32" height="9" rx="4.5" fill="#f97316"/>
      <rect x="24" y="410" width="32" height="9" rx="4.5" fill="#2563eb"/>
      <rect x="64" y="410" width="32" height="9" rx="4.5" fill="#f97316"/>
    </g>
  </g>

  <!-- left illustration: easel + palette + emerging image -->
  <g filter="url(#logoShadow)">
    <circle cx="272" cy="214" r="168" fill="none" stroke="#2563eb" stroke-width="2.5" opacity="0.22"/>
    <g stroke="#2563eb" stroke-width="2" opacity="0.35">
      <line x1="272" y1="46" x2="272" y2="28"/>
      <line x1="272" y1="382" x2="272" y2="400"/>
      <line x1="104" y1="214" x2="86" y2="214"/>
      <line x1="440" y1="214" x2="458" y2="214"/>
      <line x1="153" y1="95" x2="140" y2="82"/>
      <line x1="391" y1="333" x2="404" y2="346"/>
      <line x1="391" y1="95" x2="404" y2="82"/>
      <line x1="153" y1="333" x2="140" y2="346"/>
    </g>

    <!-- easel legs -->
    <path d="M188 330 L228 250 L272 250 L312 250 L352 330" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="272" y1="250" x2="272" y2="338" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>

    <!-- canvas -->
    <rect x="188" y="108" width="168" height="138" rx="12" fill="#ffffff" stroke="#f97316" stroke-width="10"/>
    <rect x="198" y="118" width="148" height="118" rx="10" fill="url(#canvasGlow)"/>
    <g clip-path="url(#canvasClip)">
      <rect x="198" y="118" width="148" height="118" fill="#f8fafc"/>
      <circle cx="300" cy="152" r="16" fill="#fde68a"/>
      <path d="M210 220 C 230 188, 252 198, 272 176 C 292 154, 312 162, 336 142" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
      <path d="M214 224 L 238 194 L 258 210 L 292 170 L 336 198 L 336 224 Z" fill="#86efac" opacity="0.55"/>
      <ellipse cx="252" cy="214" rx="18" ry="10" fill="#78350f" opacity="0.35"/>
      <rect x="210" y="228" width="124" height="6" rx="3" fill="url(#flow)" opacity="0.55"/>
    </g>
    <path d="M206 112 A88 88 0 0 1 330 104" stroke="#ffffff" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.6"/>

    <!-- brush stroke into canvas -->
    <path d="M118 300 C 150 260, 176 230, 210 198" stroke="#f97316" stroke-width="20" stroke-linecap="round" opacity="0.28" filter="url(#soft)"/>
    <path d="M118 300 C 150 260, 176 230, 210 198" stroke="url(#orange)" stroke-width="16" stroke-linecap="round"/>
    <path d="M124 294 C 148 272, 164 252, 186 232" stroke="#fff7ed" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

    <!-- palette -->
    <ellipse cx="118" cy="318" rx="54" ry="42" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
    <ellipse cx="118" cy="318" rx="54" ry="42" fill="none" stroke="#f97316" stroke-width="8" stroke-dasharray="0 220 40 0" transform="rotate(-18 118 318)"/>
    <circle cx="96" cy="304" r="9" fill="#3b82f6"/>
    <circle cx="118" cy="296" r="9" fill="#8b5cf6"/>
    <circle cx="140" cy="304" r="9" fill="#ec4899"/>
    <circle cx="104" cy="328" r="9" fill="#22c55e"/>
    <circle cx="132" cy="328" r="9" fill="#f97316"/>
    <circle cx="118" cy="338" r="7" fill="#1e293b"/>

    <!-- ternary chips -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="600">
      <rect x="356" y="126" width="34" height="24" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="373" y="142" text-anchor="middle" fill="#64748b">-1</text>
      <rect x="356" y="158" width="34" height="24" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="373" y="174" text-anchor="middle" fill="#64748b">0</text>
      <rect x="356" y="190" width="34" height="24" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="373" y="206" text-anchor="middle" fill="#64748b">+1</text>
    </g>

    <!-- mini pipeline -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#475467">
      <rect x="350" y="248" width="52" height="22" rx="6" fill="#ffffff" stroke="#93c5fd"/>
      <text x="376" y="263" text-anchor="middle">TE</text>
      <rect x="408" y="248" width="44" height="22" rx="6" fill="#ffffff" stroke="#c4b5fd"/>
      <text x="430" y="263" text-anchor="middle">DiT</text>
      <rect x="458" y="248" width="44" height="22" rx="6" fill="#ffffff" stroke="#f9a8d4"/>
      <text x="480" y="263" text-anchor="middle">VAE</text>
      <line x1="402" y1="259" x2="408" y2="259" stroke="#94a3b8" stroke-width="1.5"/>
      <line x1="452" y1="259" x2="458" y2="259" stroke="#94a3b8" stroke-width="1.5"/>
    </g>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="520" y="282" font-size="100" font-weight="700" fill="#1a2440" letter-spacing="-1">pictor</text>
    <rect x="520" y="292" width="220" height="7" rx="3.5" fill="#f2711c"/>

    <text x="520" y="344" font-size="26" font-weight="500" fill="#344054">Pure-Rust text-to-image and 1-bit LLM inference</text>

    <text x="520" y="392" font-size="20" font-weight="600" fill="#475467" letter-spacing="2.2">FLUX.2 DiT &#183; TQ2 GGUF &#183; METAL &amp; CUDA &#183; cos &#8805; 0.999</text>

    <text x="520" y="430" font-size="17" font-weight="500" fill="#667085" letter-spacing="0.3">github.com/vbasky/pictor &#183; pictor-core &#183; pictor-kernels &#183; pictor</text>
  </g>
</svg>